<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="world-header">
    <nav class="world-nav" aria-label="Main navigation">
      <a class="world-brand" href="index.html" aria-label="个人天地首页">
        <span class="brand-mark">YL</span>
        <span class="brand-copy">
          <span>Yong Liu</span>
          <span>个人知识库</span>
        </span>
      </a>
      <div class="world-links">
        <a href="index.html">首页</a>
        <a href="home.html">主页</a>
        <a class="is-active" href="knowledge.html">知识库</a>
        <a href="tools.html">工具箱</a>
        <a href="games.html">小游戏</a>
      </div>
    </nav>
  </header>

  <main id="main">
    <section class="world-hero">
      <div>
        <p class="kicker">Knowledge Base</p>
        <h1>个人知识库</h1>
        <p class="lead">
          研究路线、工程项目、论文写作与工具自动化。
        </p>
      </div>
      <div class="content-card">
        <span>Research Notes</span>
        <h2>笔记、项目与阅读路径</h2>
        <p>遥感匹配、嵌入式视觉、数据审计与研究写作。</p>
        <div class="image-strip" aria-hidden="true">
          <img src="assets/world/vault-map.svg" alt="">
          <img src="assets/world/workspace-grid.svg" alt="">
          <img src="assets/world/portal-knowledge.svg" alt="">
        </div>
      </div>
    </section>

    <section class="world-section">
      <div class="section-head">
        <div>
          <p class="kicker">Notes</p>
          <h2>研究笔记</h2>
        </div>
        <p class="sublead">项目、方法、实验、数据与论文记录。</p>
      </div>

      <div class="search-row" aria-label="知识库筛选">
        <input id="knowledge-search" type="search" placeholder="搜索：research、paper、method、project、automation">
        <button class="knowledge-filter primary" type="button" data-group="all">全部</button>
        <button class="knowledge-filter" type="button" data-group="research">研究</button>
        <button class="knowledge-filter" type="button" data-group="method">方法</button>
        <button class="knowledge-filter" type="button" data-group="writing">写作</button>
        <button class="knowledge-filter" type="button" data-group="reading">阅读</button>
        <button class="knowledge-filter" type="button" data-group="tools">工具</button>
      </div>

      <div class="knowledge-stats" aria-label="知识库统计">
        <div class="stat"><strong id="knowledge-total">0</strong><span>条笔记</span></div>
        <div class="stat"><strong id="knowledge-visible">0</strong><span>当前显示</span></div>
        <div class="stat"><strong id="knowledge-groups">0</strong><span>主题组</span></div>
        <div class="stat"><strong id="knowledge-updated">-</strong><span>最近更新</span></div>
      </div>

      <div id="knowledge-list" class="knowledge-layout" aria-live="polite">
        <article class="content-card knowledge-card">
          <div class="knowledge-meta"><span>Loading</span><span>Notes</span></div>
          <h3>研究笔记</h3>
          <p>请稍候。</p>
        </article>
      </div>
    </section>
  </main>

  <footer class="world-footer">
    <span>© <span id="year">2026</span> Yong Liu</span>
