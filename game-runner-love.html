<body>
  <main class="runner-shell" id="runner-love" data-game="runner-love">
    <section class="runner-phone" aria-label="心动跑酷">
      <canvas id="runner-canvas" width="720" height="1280" aria-label="三轨跑酷游戏画面"></canvas>
      <div class="runner-atmosphere" aria-hidden="true"></div>
      <div class="runner-vignette" aria-hidden="true"></div>
      <div class="runner-speed-aura" aria-hidden="true"></div>

      <header class="runner-topbar">
        <a class="icon-button runner-home" href="index.html" aria-label="返回个人天地" title="返回个人天地">‹</a>
        <div class="stage-heading">
          <span data-stage-kicker>第一程 · 再遇见</span>
          <strong data-stage-name>图书馆路口</strong>
        </div>
        <button class="icon-button sound-button" type="button" data-sound aria-label="关闭声音" title="声音">♪</button>
      </header>

      <div class="runner-hud" aria-live="polite">
        <ol class="stage-track" data-stage-track aria-label="七段旅程">
          <li class="is-current"><i></i><span>再遇</span></li><li><i></i><span>熟悉</span></li><li><i></i><span>赴约</span></li>
          <li><i></i><span>夜游</span></li><li><i></i><span>日常</span></li><li><i></i><span>雨夜</span></li><li><i></i><span>归家</span></li>
        </ol>
        <div class="hud-meters">
          <div class="condition-meter" aria-label="奔跑状态"><span class="condition-glyph">●</span><strong data-condition>100</strong><div><i data-condition-fill></i></div></div>
          <div class="stage-meter"><span data-progress>0 / 30</span><div><i data-progress-fill></i></div></div>
          <strong class="combo" data-combo></strong>
        </div>
        <div class="destination-line"><span data-destination>去 图书馆路口</span><div class="runner-cargo" data-cargo hidden></div></div>
        <div class="run-state-line">
          <div class="speed-state" data-speed-state aria-label="当前速度">
            <span aria-hidden="true">»</span><strong data-speed-label>起跑</strong><i><b data-speed-fill></b></i>
          </div>
          <div class="powerup-rack" data-powerup-rack aria-label="当前效果"></div>
        </div>
        <div class="run-telemetry" aria-label="本局数据">
          <span><small>SCORE</small><strong data-score>0</strong></span>
          <span><small>DIST</small><strong data-distance>0m</strong></span>
        </div>
      </div>

      <div class="runner-toast" data-toast hidden></div>
      <div class="route-message" data-route-message hidden><small data-route-time>18:12</small><span data-route-copy></span></div>
      <div class="gesture-cue" data-gesture-cue aria-hidden="true"><span>↑</span><span>←</span><span>↓</span><span>→</span></div>

      <section class="runner-overlay runner-intro" data-intro>
        <p class="eyebrow">TONIGHT, SEE YOU</p>
        <h1>今晚见</h1>
        <div class="intro-message"><small>18:12</small><p>刚才是不是在香樟路看见你了？</p></div>
        <p class="intro-line">穿过雨后的香樟道。沿途选中的东西会被你真正带到见面地点，也会改变抵达时发生的事。</p>
        <button class="primary-button" type="button" data-start>去见她</button>
        <div class="saved-run" data-saved-run hidden>
          <button class="quiet-button" type="button" data-continue>继续旅程</button>
          <button class="text-button" type="button" data-new-run>重新开始</button>
        </div>
        <button class="quiet-button new-game-plus" type="button" data-new-game-plus hidden>换一条路线再赴约</button>
      </section>

      <section class="arrival-caption" data-arrival hidden aria-live="polite">
        <p data-arrival-kicker>图书馆路口</p>
        <h2 data-arrival-title>透明雨伞</h2>
        <span data-arrival-copy></span>
        <i aria-hidden="true"></i>
      </section>

      <section class="runner-overlay result" data-result hidden>
        <p class="eyebrow">ROUTE COMPLETE</p>
        <div class="grade" data-grade>S</div>
        <h2 data-ending-title>今晚，抵达</h2>
        <p data-ending-copy></p>
        <dl class="result-stats"><div><dt>抵达</dt><dd data-stat-completion>100%</dd></div><div><dt>动作</dt><dd data-stat-accuracy>100%</dd></div><div><dt>带到终点</dt><dd data-stat-items>0</dd></div><div><dt>碰撞</dt><dd data-stat-collisions>0</dd></div></dl>
        <button class="primary-button" type="button" data-retry>从最近路口重试</button>
        <button class="quiet-button" type="button" data-restart>换一条路线</button>
        <a class="text-button" href="index.html">回到个人天地</a>
      </section>

      <div class="sr-only" role="status" aria-live="assertive" data-announcer></div>
    </section>
  </main>

</html>
