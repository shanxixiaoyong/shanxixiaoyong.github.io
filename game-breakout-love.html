<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>心动打砖块 - 刘勇 / Yong Liu</title>
  <meta name="description" content="心动打砖块：让回信化作光，穿过层层防线，揭开雨夜、约会与星光里的心动场景。">
  <meta name="theme-color" content="#110d12">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=yl-20260630">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png?v=yl-20260630">
  <link rel="shortcut icon" href="favicon.ico?v=yl-20260630">
  <link rel="stylesheet" href="assets/breakout-love.css?v=breakout-love-20260711a">
</head>
<body class="breakout-love-page">
  <main class="bl-app" id="breakout-love-game" aria-label="心动打砖块">
    <header class="bl-topbar">
      <a class="bl-icon bl-back" href="index.html" aria-label="返回首页" title="返回首页">
        <span aria-hidden="true">‹</span>
      </a>
      <div class="bl-brand">
        <span>LOVE LETTER / 04</span>
        <h1>心动打砖块</h1>
      </div>
      <div class="bl-score" aria-label="当前得分">
        <span>SCORE</span>
        <strong id="bl-score">000000</strong>
      </div>
      <button class="bl-icon" id="bl-sound" type="button" aria-label="关闭声音" aria-pressed="true" title="声音">
        <span aria-hidden="true">♪</span>
      </button>
      <button class="bl-icon" id="bl-pause" type="button" aria-label="暂停游戏" title="暂停">
        <span aria-hidden="true">Ⅱ</span>
      </button>
    </header>

    <section class="bl-telemetry" aria-label="关卡信息">
      <div class="bl-chapter">
        <span id="bl-kicker">未读 · 21:17</span>
        <strong id="bl-level">01 · 迟到的回信</strong>
      </div>
      <div class="bl-lives" id="bl-lives" aria-label="剩余三次回信">
        <span>回信</span>
        <div aria-hidden="true"><i></i><i></i><i></i></div>
      </div>
    </section>

    <section class="bl-stage" id="bl-stage" aria-label="打砖块游戏区域">
      <canvas id="bl-canvas" tabindex="0" aria-label="拖动控制回信轨迹，方向键也可移动"></canvas>

      <div class="bl-caption" aria-hidden="true">
        <span id="bl-scene-number">SCENE 01</span>
        <strong id="bl-scene-status">图书馆那盏灯还亮着</strong>
      </div>

      <div class="bl-moment" id="bl-moment" aria-hidden="true"></div>
      <div class="bl-toast" id="bl-toast" role="status" aria-live="polite"></div>
      <div class="bl-charms" id="bl-charms" aria-label="生效中的心意"></div>

      <section class="bl-sheet bl-pause-sheet" id="bl-pause-sheet" aria-labelledby="bl-pause-title" hidden>
        <span>夜色停在这里</span>
        <strong id="bl-pause-title">回信还悬在半空</strong>
        <p>灯没有熄灭。</p>
        <div>
          <button type="button" id="bl-resume">继续</button>
          <button type="button" id="bl-restart-pause">重新寄出</button>
        </div>
      </section>

      <section class="bl-sheet bl-result-sheet" id="bl-result-sheet" aria-labelledby="bl-result-title" hidden>
        <span id="bl-result-kicker">信号中断</span>
        <strong id="bl-result-title">这一封没有抵达</strong>
        <b id="bl-result-score">000000</b>
        <p id="bl-result-line">但晚风还记得来时的方向。</p>
        <button type="button" id="bl-restart-result">再寄一封</button>
      </section>
    </section>

    <footer class="bl-dock">
      <button class="bl-icon" id="bl-restart" type="button" aria-label="重新开始" title="重新开始">
        <span aria-hidden="true">↻</span>
      </button>
      <p id="bl-status" aria-live="polite">第一封回信正在靠近</p>
      <div class="bl-best"><span>BEST</span><strong id="bl-best">000000</strong></div>
    </footer>

    <section class="bl-event" id="bl-event" aria-live="polite" aria-atomic="true" hidden>
      <div class="bl-event-scene" id="bl-event-scene" aria-hidden="true"></div>
      <div class="bl-event-copy">
        <span id="bl-event-kicker">未读信号</span>
        <strong id="bl-event-title">她看见了</strong>
        <p id="bl-event-line">灯停在那一页，回信终于穿过沉默。</p>
      </div>
    </section>
  </main>

  <script src="assets/breakout-love-rules.js?v=breakout-love-20260711a"></script>
  <script src="assets/breakout-love-game.js?v=breakout-love-20260711a"></script>
</body>
</html>
