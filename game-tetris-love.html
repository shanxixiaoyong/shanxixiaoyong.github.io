<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>心动俄罗斯方块 - 刘勇 / Yong Liu</title>
  <meta name="description" content="心动俄罗斯方块：让两个人的日程、消息与生活碎片，在同一行里找到彼此。">
  <meta name="theme-color" content="#171821">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=yl-20260630">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png?v=yl-20260630">
  <link rel="shortcut icon" href="favicon.ico?v=yl-20260630">
  <link rel="stylesheet" href="assets/tetris-love.css?v=tetris-love-20260711a">
</head>
<body class="tetris-love-page">
  <main class="tl-app" id="tetris-love-game" aria-label="心动俄罗斯方块">
    <canvas class="tl-fx" id="tl-fx" aria-hidden="true"></canvas>

    <header class="tl-topbar">
      <a class="tl-icon-button tl-back" href="index.html" aria-label="返回首页" title="返回首页">‹</a>
      <div class="tl-brand">
        <span>Two timelines</span>
        <h1>心动俄罗斯方块</h1>
      </div>
      <div class="tl-score" aria-label="当前心动值">
        <span>心动值</span>
        <strong id="tl-score">0</strong>
      </div>
      <button class="tl-icon-button" id="tl-sound" type="button" aria-label="开启声音" title="声音">♪</button>
      <button class="tl-icon-button" id="tl-pause" type="button" aria-label="暂停游戏" title="暂停">Ⅱ</button>
    </header>

    <section class="tl-memory" aria-label="关系时刻">
      <div class="tl-memory-index"><i></i><span id="tl-memory-page">序章</span><i></i></div>
      <p id="tl-moment" aria-live="polite">两份日程，正在寻找同一行</p>
      <strong id="tl-reward" aria-live="polite"></strong>
    </section>

    <section class="tl-stage" aria-label="游戏区域">
      <div class="tl-play-layout">
        <div class="tl-board-shell" id="tl-board-shell">
          <canvas id="tl-board" tabindex="0" role="img" aria-label="十列二十行俄罗斯方块棋盘"></canvas>
          <div class="tl-board-sheen" aria-hidden="true"></div>
          <div class="tl-coach" id="tl-coach" aria-hidden="true">
            <span><b>↔</b> 拖动</span><i></i><span><b>↻</b> 轻点</span><i></i><span><b>⇊</b> 下滑</span>
          </div>
          <div class="tl-toast" id="tl-toast" role="status" aria-live="polite"></div>
          <div class="tl-streak" id="tl-streak" aria-hidden="true"></div>
        </div>

        <aside class="tl-rail" aria-label="方块信息">
          <button class="tl-hold" id="tl-hold" type="button" aria-label="暂存当前方块" title="暂存方块">
            <span>稍后</span>
            <canvas id="tl-hold-canvas" width="128" height="104" aria-hidden="true"></canvas>
            <small id="tl-hold-state">可暂存</small>
          </button>
          <section class="tl-next" aria-label="接下来的方块">
            <span>未读</span>
            <canvas id="tl-next-canvas" width="128" height="360" aria-hidden="true"></canvas>
          </section>
          <dl class="tl-stats">
            <div><dt>LEVEL</dt><dd id="tl-level">1</dd></div>
            <div><dt>LINES</dt><dd id="tl-lines">0</dd></div>
            <div><dt>BEST</dt><dd id="tl-best">0</dd></div>
          </dl>
        </aside>
      </div>
    </section>

    <section class="tl-rhythm" aria-label="默契状态">
      <span id="tl-rhythm-label">默契</span>
      <div class="tl-rhythm-track" aria-hidden="true"><i id="tl-rhythm-fill"></i><b id="tl-promise-mark"></b></div>
      <p id="tl-status" aria-live="polite">把今天，慢慢放在一起</p>
    </section>

    <section class="tl-sheet" id="tl-pause-sheet" aria-modal="true" role="dialog" hidden>
      <span>这一刻先留白</span>
      <strong>两份日程都在等你</strong>
      <p>音乐与时间已经停在这里。</p>
      <div>
        <button type="button" id="tl-resume">继续靠近</button>
        <button class="tl-secondary" type="button" id="tl-restart-pause">重排今天</button>
      </div>
    </section>

    <section class="tl-sheet tl-result" id="tl-result" aria-modal="true" role="dialog" hidden>
      <span>这一页写满了</span>
      <strong id="tl-result-score">0</strong>
      <p id="tl-result-copy">有些相遇，换一页仍会继续。</p>
      <dl>
        <div><dt>共同完成</dt><dd id="tl-result-lines">0 行</dd></div>
        <div><dt>最好心动</dt><dd id="tl-result-best">0</dd></div>
      </dl>
      <button type="button" id="tl-restart-result">再写一页</button>
    </section>

    <section class="tl-milestone" id="tl-milestone" aria-live="assertive" aria-atomic="true" hidden>
      <div class="tl-scene" aria-hidden="true">
        <div class="tl-scene-lines"><i></i><i></i><i></i><i></i></div>
        <div class="tl-scene-messages"><i></i><i></i></div>
        <div class="tl-scene-windows"></div>
      </div>
      <div class="tl-milestone-copy">
        <span id="tl-milestone-kicker">关系时刻</span>
        <strong id="tl-milestone-title">第一次同一行</strong>
        <p id="tl-milestone-copy">两份忙碌，在今天空出了同一个傍晚。</p>
      </div>
      <button id="tl-milestone-skip" type="button" aria-label="收下这一刻">收下</button>
    </section>
  </main>

  <script src="assets/tetris-love-rules.js?v=tetris-love-20260711a"></script>
  <script src="assets/tetris-love-game.js?v=tetris-love-20260711a"></script>
</body>
</html>
