    <nav class="world-nav" aria-label="Main navigation">
      <a class="world-brand" href="index.html" aria-label="个人天地首页">

      </div>
    </nav>
  </header>

  <main id="main">
    <section class="world-hero">
      <div>
        <p class="kicker">Mini Games</p>
        <h1>小游戏</h1>
        <p class="lead">记忆、反应与数字节奏。</p>
      </div>
      <div class="content-card">
        <span>Play</span>
        <h2>轻量游戏</h2>
        <p>记忆翻牌、反应速度和数字滑块。</p>
        <div class="image-strip" aria-hidden="true">
          <img src="assets/world/game-board.svg" alt="">
          <img src="assets/world/portal-games.svg" alt="">
          <img src="assets/world/workspace-grid.svg" alt="">
        </div>
      </div>
    </section>

    <section class="world-section">
      <div class="section-head">
        <div>
          <p class="kicker">Play</p>
          <h2>小游戏</h2>
        </div>
        <p class="sublead">记忆翻牌、反应速度、数字滑块。</p>
      </div>

      <div class="game-grid">
        <article class="game-card">
          <h3>记忆翻牌</h3>
          <div id="memory-board" class="memory-board" aria-label="记忆翻牌棋盘"></div>
          <div class="hero-actions">
            <button id="memory-reset" class="primary" type="button">重新开始</button>
            <span id="memory-moves" class="button-link" aria-live="polite">步数 0</span>
          </div>
        </article>

        <article class="game-card">
          <h3>反应速度</h3>
          <button id="reaction-pad" class="reaction-pad" type="button">准备区</button>
          <div class="hero-actions">
            <button id="reaction-start" class="primary" type="button">开始</button>
            <span id="reaction-output" class="button-link" aria-live="polite">尚无成绩</span>
          </div>
        </article>

        <article class="game-card">
          <h3>数字滑块</h3>
          <div id="number-board" class="number-board" aria-label="数字滑块棋盘"></div>
          <div class="hero-actions">
            <button id="number-reset" class="primary" type="button">打乱</button>
            <span id="number-status" class="button-link" aria-live="polite">目标 1-8</span>
          </div>
        </article>
      </div>
    </section>
  </main>
