<body class="arcade-page">
  <a class="skip-link" href="#main">Skip to content</a>

    <header class="arcade-appbar">
      <a class="arcade-back" href="index.html" aria-label="返回个人天地">
        <span class="brand-mark">YL</span>
      </a>
      <div>
        <p class="kicker">Arcade</p>
        <h1>游戏厅</h1>
      </div>
      <nav class="arcade-jump" aria-label="Arcade navigation">
        <a href="home.html">主页</a>
        <a href="knowledge.html">知识库</a>

      </nav>

        <p>方块、数字、棋盘、弹珠、合成、跳跃、塔防和卡牌。</p>

          </div>
          <div class="arcade-hud">
