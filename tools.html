<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="刘勇 / Yong Liu 的个人小工具箱，包含文本统计、引用格式、日期倒计时和专注计时。">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=yl-20260630">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png?v=yl-20260630">
  <link rel="shortcut icon" href="favicon.ico?v=yl-20260630">
  <link rel="stylesheet" href="assets/world.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="world-header">
    <nav class="world-nav" aria-label="Main navigation">
      <a class="world-brand" href="index.html" aria-label="个人天地首页">
        <span class="brand-mark">YL</span>
        <span class="brand-copy">
          <span>Yong Liu</span>
          <span>小工具箱</span>
        </span>
      </a>
      <div class="world-links">
        <a href="index.html">入口</a>
        <a href="home.html">主页</a>
        <a href="knowledge.html">知识库</a>
        <a class="is-active" href="tools.html">工具箱</a>
        <a href="games.html">小游戏</a>
      </div>
    </nav>
  </header>

  <main id="main">
    <section class="world-hero">
      <div>
        <p class="kicker">Small Toolbox</p>
        <h1>个人小工具箱</h1>
        <p class="lead">围绕写作、时间、换算和整理的轻量工具集合。打开页面即可处理常见小任务。</p>
      </div>
      <div class="content-card">
        <span>Workbench</span>
        <h2>写作和整理的工作台</h2>
        <p>摘要统计、引用草稿、倒计时、专注计时和单位换算放在同一处，减少来回切换。</p>
        <div class="image-strip" aria-hidden="true">
          <img src="assets/world/tool-console.svg" alt="">
          <img src="assets/world/workspace-grid.svg" alt="">
          <img src="assets/world/portal-tools.svg" alt="">
        </div>
      </div>
    </section>

    <section class="world-section">
      <div class="section-head">
        <div>
          <p class="kicker">Tools</p>
          <h2>可用工具</h2>
        </div>
        <p class="sublead">工具以清晰、稳定、低干扰为主，覆盖写作和资料整理时最常见的即时需求。</p>
      </div>

      <div class="tool-grid">
        <article class="tool-card">
          <h3>文本统计</h3>
          <textarea id="text-input" placeholder="粘贴摘要、笔记或待统计文本"></textarea>
          <div id="text-stats" class="stat-row" aria-live="polite"></div>
        </article>

        <article class="tool-card">
          <h3>引用格式草稿</h3>
          <form id="citation-form" class="form-grid">
            <label>Authors<input name="authors" value="Liu Y., Gao S."></label>
            <label>Year<input name="year" value="2026"></label>
            <label>Title<input name="title" value="Research note title"></label>
            <label>Venue<input name="venue" value="Journal or Conference"></label>
            <label>DOI<input name="doi" placeholder="10.xxxx/xxxxx"></label>
            <button class="primary" type="submit">生成</button>
          </form>
          <div id="citation-output" class="output-box" aria-live="polite"></div>
        </article>

        <article class="tool-card">
          <h3>日期倒计时</h3>
          <div class="form-grid">
            <label>事项<input id="deadline-title" value="论文截止"></label>
            <label>日期<input id="deadline-date" type="date"></label>
          </div>
          <div id="deadline-output" class="output-box" aria-live="polite"></div>
        </article>

        <article class="tool-card">
          <h3>专注计时</h3>
          <label>分钟<input id="focus-minutes" type="number" min="1" max="180" value="25"></label>
          <div id="focus-output" class="output-box" aria-live="polite"></div>
          <div class="hero-actions">
            <button id="focus-start" class="primary" type="button">开始</button>
            <button id="focus-reset" type="button">重置</button>
          </div>
        </article>

        <article class="tool-card">
          <h3>单位换算</h3>
          <div class="form-grid">
            <label>数值<input id="unit-value" type="number" value="10" step="0.01"></label>
            <label>类型
              <select id="unit-type">
                <option value="mm-inch">毫米 ↔ 英寸</option>
                <option value="cm-inch">厘米 ↔ 英寸</option>
                <option value="px-mm">300 dpi 像素 ↔ 毫米</option>
              </select>
            </label>
          </div>
          <div id="unit-output" class="output-box" aria-live="polite"></div>
        </article>

        <article class="tool-card">
          <h3>实验日志片段</h3>
          <div class="form-grid">
            <label>任务<input id="log-task" value="模型对比实验"></label>
            <label>数据<input id="log-data" value="validation split"></label>
            <label>指标<input id="log-metric" value="AUC / F1"></label>
            <label>结论<input id="log-finding" value="主模型在稳定性上更好"></label>
          </div>
          <div id="log-output" class="output-box" aria-live="polite"></div>
          <button id="copy-log" type="button">复制片段</button>
        </article>
      </div>
    </section>
  </main>

  <footer class="world-footer">
    <span>© <span id="year">2026</span> Yong Liu</span>
    <span><a href="index.html">个人天地</a> · <a href="games.html">小游戏</a></span>
  </footer>

  <script src="assets/world.js"></script>
</body>
</html>
