<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>心动大西瓜 - 刘勇 / Yong Liu</title>
  <meta name="description" content="心动大西瓜：让余光、聊天、票根与拥抱在下落中相遇，收藏一场只属于你的浪漫幻想。">
  <meta name="theme-color" content="#171820">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=yl-20260630">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png?v=yl-20260630">
  <link rel="shortcut icon" href="favicon.ico?v=yl-20260630">
  <link rel="stylesheet" href="assets/watermelon.css?v=heartmelon-20260711a">
</head>
<body class="solo-game-watermelon">
  <main class="wm-app" id="watermelon-game" aria-label="心动大西瓜">
    <header class="wm-topbar">
      <a class="wm-icon wm-back" href="index.html" aria-label="返回首页" title="返回首页"><span aria-hidden="true">←</span></a>
      <div class="wm-title">
        <span>Private moments</span>
        <h1>心动大西瓜</h1>
      </div>
      <div class="wm-score" aria-label="当前心绪">
        <span>心绪</span>
        <strong id="wm-score">0</strong>
      </div>
      <button class="wm-icon" id="wm-sound" type="button" aria-label="关闭声音" title="声音"><span aria-hidden="true">♪</span></button>
      <button class="wm-icon" id="wm-pause" type="button" aria-label="暂停游戏" title="暂停"><span aria-hidden="true">Ⅱ</span></button>
    </header>

    <section class="wm-forecast" aria-label="心动片段预告">
      <div class="wm-current">
        <span>此刻</span>
        <canvas id="wm-current-moment" width="112" height="112" aria-hidden="true"></canvas>
        <strong id="wm-current-name">初见余光</strong>
        <small id="wm-current-material">镜面微光</small>
      </div>
      <div class="wm-next">
        <span>将至</span>
        <canvas id="wm-next-one" width="72" height="72" aria-hidden="true"></canvas>
        <canvas id="wm-next-two" width="72" height="72" aria-hidden="true"></canvas>
      </div>
      <div class="wm-affinity" aria-label="勇气进度">
        <span>勇气</span>
        <div id="wm-courage" aria-hidden="true"><i></i><i></i><i></i></div>
        <small id="wm-courage-copy">等待回应</small>
      </div>
    </section>

    <section class="wm-stage" id="wm-stage" aria-label="心动大西瓜游戏区域" data-scene="platform">
      <canvas id="wm-canvas" tabindex="0" aria-label="拖动心动片段选择位置，松手让它落下"></canvas>
      <div class="wm-scene-chip" aria-hidden="true">
        <span id="wm-scene-name">站台暮色</span>
        <i id="wm-scene-chapter">01</i>
      </div>
      <div class="wm-toast" id="wm-toast" role="status" aria-live="polite"></div>
      <div class="wm-combo" id="wm-combo" aria-hidden="true"></div>

      <div class="wm-cinematic" id="wm-cinematic" aria-live="polite" aria-atomic="true" data-performance="glance" hidden>
        <div class="wm-event-atmosphere" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
        <canvas id="wm-event-canvas" width="480" height="480" aria-hidden="true"></canvas>
        <button class="wm-event-close" id="wm-event-close" type="button" aria-label="收起片段" title="收起"><span aria-hidden="true">×</span></button>
        <div class="wm-cinematic-copy">
          <span id="wm-cinematic-kicker">第一次收藏</span>
          <strong id="wm-cinematic-title">目光停了一秒</strong>
          <p id="wm-cinematic-line">隔着车窗的倒影，你悄悄把那一眼留了下来。</p>
        </div>
      </div>

      <div class="wm-pause-sheet" id="wm-pause-sheet" hidden>
        <span>这一刻暂停</span>
        <strong>夜色还在原地</strong>
        <button type="button" id="wm-resume">继续</button>
      </div>

      <div class="wm-result" id="wm-result" hidden>
        <span>心事装满这一夜</span>
        <strong id="wm-result-score">0</strong>
        <p id="wm-result-copy">有些靠近，已经被好好记住。</p>
        <div>
          <button type="button" id="wm-revive">回到上一刻</button>
          <button type="button" id="wm-restart-result">从余光开始</button>
        </div>
      </div>
    </section>

    <footer class="wm-dock">
      <button class="wm-icon" id="wm-restart" type="button" aria-label="重新开始" title="重新开始"><span aria-hidden="true">↻</span></button>
      <p id="wm-status">故事从一次余光开始</p>
      <div class="wm-best"><span>峰值</span><strong id="wm-best">0</strong></div>
    </footer>
  </main>

  <script src="assets/vendor/matter-0.20.0.min.js?v=0.20.0"></script>
  <script src="assets/watermelon-rules.js?v=heartmelon-20260711a"></script>
  <script src="assets/watermelon-game.js?v=heartmelon-20260711a"></script>
</body>
</html>
